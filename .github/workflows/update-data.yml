name: 🎰 更新双色球数据

# 触发：
#   · 开奖日（周二/四/日）22:00 + 23:00 北京时间（首抓 + 一次兜底重试）
#   · 每月 1 日 02:00 北京时间（强制重算 stats）
#   · 手动触发
#
# 双色球开奖时间：周二/四/日 21:15 北京时间，数据源 21:30~22:00 同步完成。
# 幂等：抓取前先检查 data/latest.json，date == 今日（北京时间）则整流程跳过。
"on":
  schedule:
    # 开奖日 22:00 北京时间 = 14:00 UTC（首抓）
    - cron: '0 14 * * 0,2,4'
    # 开奖日 23:00 北京时间 = 15:00 UTC（兜底重试，仅在 22:00 没抓到时实际执行）
    - cron: '0 15 * * 0,2,4'
    # 每月 1 日凌晨 2:00 北京时间 = 18:00 UTC（前一天），强制重算
    - cron: '0 18 1 * *'
  # 允许手动在 GitHub 网页上点按钮触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental    # 增量（仅当有新数据时才重算）
          - full           # 强制重算（即使无新数据也重算 stats/latest）

# 授权：需要 write 权限才能 commit/push 数据文件回仓库
permissions:
  contents: write

# 防并发：同一时间只跑一个 update（重试 cron 互相不会撞车）
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 拉代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 装 Python
      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # 3. 装依赖
      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 判断运行模式
      - name: 🧭 判定运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi
          echo "触发模式: $(cat $GITHUB_OUTPUT)"

      # 5. 幂等检查：incremental 模式下，若 latest.json 的 date 已经是今天（北京时间），
      #    说明本期已抓取过，后续重试无需再跑——节省资源、避免噪音 commit
      #    full 模式 / 手动触发的 incremental 不跳过（用户的明确意图优先）
      - name: ⏭️  检查是否已抓取本期
        id: check
        run: |
          TODAY=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "今日（北京时间）: $TODAY"

          if [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
            echo "→ full 模式，不跳过"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "→ 手动触发，不跳过"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_DATE=$(python -c "import json; print(json.load(open('web/data/latest.json'))['latest_draw']['date'])" 2>/dev/null || echo "")
          echo "latest.json 中最新一期: $LATEST_DATE"

          if [ "$LATEST_DATE" = "$TODAY" ]; then
            echo "✅ 本期数据已存在，跳过本次重试"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "→ 本期尚未抓取，继续执行"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # 6. 抓取最新开奖数据（多源容错；fetch_latest.py 内部已按顺序尝试 3 个数据源）
      - name: 🌐 抓取最新开奖数据
        id: fetch
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        run: |
          python scripts/fetch_latest.py
          echo "fetch_ok=true" >> $GITHUB_OUTPUT

      # 7. 重算统计：增量模式仅在抓取成功时跑；full 模式无条件跑
      - name: 📊 重算统计数据
        if: steps.check.outputs.skip != 'true' && (steps.fetch.outputs.fetch_ok == 'true' || steps.mode.outputs.mode == 'full')
        run: python scripts/calc_all.py

      # 8. 数据自检（不阻塞 commit，但要在日志里能看到结果）
      #    注：早期还会调 update_readme.py 写期数 badge，现在 README 改用 shields.io
      #    dynamic JSON badge 实时拉 latest.json，README 本身不需写回——该 step 已删。
      - name: 🔍 数据自检
        if: steps.check.outputs.skip != 'true' && (steps.fetch.outputs.fetch_ok == 'true' || steps.mode.outputs.mode == 'full')
        run: python scripts/verify_data.py
        continue-on-error: true

      # 9. 如果 web/data/ 有变化，commit 回主分支
      #     重试 cron 的好处：本次抓到了新期 → 触发 commit；没抓到 → 静默跳过
      - name: 💾 提交数据变更
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # 仅提交 web/data/：README 不再随数据变动（期数依赖 dynamic badge）
          git add web/data/
          if git diff --cached --quiet; then
            echo "⚠️  数据无变化，跳过 commit"
          else
            CHANGES=$(git diff --cached --stat | tail -1)
            TS=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M 北京时间')
            git commit -m "chore(data): 自动更新 @ $TS [${{ steps.mode.outputs.mode }}] | ${CHANGES}"
            git push
            echo "✅ 数据已更新并推送"
          fi

