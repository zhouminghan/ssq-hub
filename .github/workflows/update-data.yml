name: 🎰 更新双色球数据

# 自动更新双色球开奖数据 workflow
# 触发：
#   · 开奖日（周二/四/日）22:30 + 23:30 + 次日 08:00 北京时间（多次重试，避免数据源未及时同步导致漏抓）
#   · 每月 1 日 02:00 北京时间（强制重算）
#   · 手动触发
#
# 双色球开奖时间：周二/四/日 21:15 北京时间
# 数据源同步通常在 21:30~22:00 之间完成，22:30 是首次抓取的合理时机
"on":
  schedule:
    # 开奖日 22:30 北京时间 = 14:30 UTC（首抓）
    - cron: '30 14 * * 0,2,4'
    # 开奖日 23:30 北京时间 = 15:30 UTC（重试 1：兜底数据源延迟）
    - cron: '30 15 * * 0,2,4'
    # 次日 08:00 北京时间 = 00:00 UTC（重试 2：极端情况下兜底）
    - cron: '0 0 * * 1,3,5'
    # 每月 1 日凌晨 2:00 北京时间 = 18:00 UTC（前一天），强制重算
    - cron: '0 18 1 * *'
  # 允许手动在 GitHub 网页上点按钮触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental    # 增量（仅当有新数据时才重算）
          - full           # 强制重算（即使无新数据也重算 stats/latest）

# 授权：需要 write 权限才能 commit/push 数据文件回仓库
permissions:
  contents: write

# 防并发：同一时间只跑一个 update（重试 cron 互相不会撞车）
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 拉代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 装 Python
      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # 3. 装依赖
      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 判断运行模式
      - name: 🧭 判定运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi
          echo "触发模式: $(cat $GITHUB_OUTPUT)"

      # 5. 抓取最新开奖数据（多源容错；fetch_latest.py 内部已按顺序尝试 3 个数据源）
      - name: 🌐 抓取最新开奖数据
        id: fetch
        continue-on-error: true
        run: |
          python scripts/fetch_latest.py
          echo "fetch_ok=true" >> $GITHUB_OUTPUT

      # 6. 重算统计：增量模式仅在抓取成功时跑；full 模式无条件跑
      - name: 📊 重算统计数据
        if: steps.fetch.outputs.fetch_ok == 'true' || steps.mode.outputs.mode == 'full'
        run: python scripts/calc_all.py

      # 7. 更新 README 期数信息
      - name: 📝 更新 README 期数 badge
        if: steps.fetch.outputs.fetch_ok == 'true' || steps.mode.outputs.mode == 'full'
        run: python scripts/update_readme.py

      # 8. 数据自检（不阻塞 commit，但要在日志里能看到结果）
      - name: 🔍 数据自检
        if: steps.fetch.outputs.fetch_ok == 'true' || steps.mode.outputs.mode == 'full'
        run: python scripts/verify_data.py
        continue-on-error: true

      # 9. 如果 data/ 或 README 有变化，commit 回主分支
      #    重试 cron 的好处：本次抓到了新期 → 触发 commit；没抓到 → 静默跳过
      - name: 💾 提交数据变更
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ README.md
          if git diff --cached --quiet; then
            echo "⚠️  数据无变化，跳过 commit"
          else
            CHANGES=$(git diff --cached --stat | tail -1)
            TS=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M 北京时间')
            git commit -m "chore(data): 自动更新 @ $TS [${{ steps.mode.outputs.mode }}] | ${CHANGES}"
            git push
            echo "✅ 数据已更新并推送"
          fi
