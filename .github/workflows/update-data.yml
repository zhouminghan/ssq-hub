name: 🎰 更新双色球数据

# 触发：
#   · 开奖日（周二/四/日）21:15 + 22:00 北京时间（首抓 + 一次兜底重试）
#   · 每月 1 日 02:00 北京时间（强制重算 stats）
#   · 手动触发
#
# 双色球开奖时间：周二/四/日 21:15 北京时间，数据源 21:30~22:00 同步完成。
# 幂等：抓取前先检查 data/latest.json，date == 今日（北京时间）则整流程跳过。
"on":
  schedule:
    # 开奖日 21:15 北京时间 = 13:15 UTC（首抓，开奖后立即运行）
    - cron: '15 13 * * 0,2,4'
    # 开奖日 22:00 北京时间 = 14:00 UTC（兜底重试，仅在 21:15 没抓到时实际执行）
    - cron: '0 14 * * 0,2,4'
    # 每月 1 日凌晨 2:00 北京时间 = 18:00 UTC（前一天），强制重算
    - cron: '0 18 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

# 仅需 contents:write（commit / push 数据文件）
permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧭 判定运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: ⏭️ 检查是否已抓取本期
        id: check
        run: |
          TODAY=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "今日（北京时间）: $TODAY"

          if [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
            echo "→ full 模式，不跳过"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "→ 手动触发，不跳过"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_DATE=$(python -c "import json; print(json.load(open('web/data/latest.json'))['latest_draw']['date'])" 2>/dev/null || echo "")
          echo "latest.json 中最新一期: $LATEST_DATE"

          if [ "$LATEST_DATE" = "$TODAY" ]; then
            echo "✅ 本期数据已存在，跳过本次重试"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "→ 本期尚未抓取，继续执行"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # 抓取层的多源 fallback 由 fetch_latest.py 内部负责。
      # workflow 只做顺序调度：fetch → calc → verify → commit。
      - name: 🌐 抓取最新开奖数据
        if: steps.check.outputs.skip != 'true'
        run: python scripts/fetch_latest.py

      - name: 📊 重算统计数据
        if: steps.check.outputs.skip != 'true'
        run: python scripts/calc_all.py

      # verify_data 是发布前硬门槛：失败即 job 失败，不 commit、不 deploy。
      - name: 🔍 数据自检
        if: steps.check.outputs.skip != 'true'
        run: python scripts/verify_data.py

      - name: 💾 提交数据变更
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/data/
          if git diff --cached --quiet; then
            echo "⚠️ 数据无变化，跳过 commit"
          else
            CHANGES=$(git diff --cached --stat | tail -1)
            TS=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M 北京时间')
            git commit -m "chore(data): 自动更新 @ $TS [${{ steps.mode.outputs.mode }}] | ${CHANGES}"
            git push
            echo "✅ 数据已推送；Pages 将由 deploy-pages.yml 通过 workflow_run 处理"
          fi
