name: 🔄 自动更新双色球数据

on:
  schedule:
    # 每周二、四、日 22:30 北京时间 = UTC 14:30
    - cron: '30 14 * * 0,2,4'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🌐 抓取最新开奖数据
        run: python scripts/fetch_latest.py

      - name: 📊 重新计算统计指标
        run: python scripts/calc_all.py

      - name: 📝 更新 README 期数信息
        run: python scripts/update_readme.py

      - name: 🚀 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # 仅在有变更时提交
          git diff --staged --quiet || git commit -m "🤖 自动更新: $(date +'%Y-%m-%d %H:%M') UTC"
          git push
