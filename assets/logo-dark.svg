<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <defs>
    <!-- 红球径向渐变 -->
    <radialGradient id="redBall" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FF8A8A"/>
      <stop offset="50%" stop-color="#E8192C"/>
      <stop offset="100%" stop-color="#B0102A"/>
    </radialGradient>
    <!-- 蓝球径向渐变 -->
    <radialGradient id="blueBall" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7AB5E8"/>
      <stop offset="50%" stop-color="#3A6FBB"/>
      <stop offset="100%" stop-color="#1F4A8A"/>
    </radialGradient>
    <!-- 球体高光 -->
    <radialGradient id="highlight" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- 文字渐变 (深色模式) -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="60%" stop-color="#E8192C"/>
      <stop offset="100%" stop-color="#5B9BD5"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 红球 -->
  <g filter="url(#shadow)">
    <circle cx="50" cy="55" r="38" fill="url(#redBall)"/>
    <circle cx="50" cy="55" r="38" fill="url(#highlight)"/>
    <text x="50" y="63" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="22" fill="white" opacity="0.95">01</text>
  </g>

  <!-- 蓝球 -->
  <g filter="url(#shadow)">
    <circle cx="130" cy="55" r="38" fill="url(#blueBall)"/>
    <circle cx="130" cy="55" r="38" fill="url(#highlight)"/>
    <text x="130" y="63" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="22" fill="white" opacity="0.95">16</text>
  </g>

  <!-- 标题文字 -->
  <text x="190" y="52" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-weight="700" font-size="36" fill="url(#textGrad)">双色球数据中心</text>

  <!-- 副标题 -->
  <text x="190" y="82" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-weight="400" font-size="15" fill="#AAAAAA">SSQ Hub · 历史查询 · 智能选号 · 统计分析</text>
</svg>
