<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="双色球走势图 · 纯前端 · GitHub Pages 自动更新数据" />
  <title>双色球走势图 · ssq-hub</title>
  <!-- 防闪烁：在 CSS 加载前读取用户偏好或系统主题 -->
  <script>
    (function(){
      var t=localStorage.getItem('theme');
      if(t==='light'||t==='dark') document.documentElement.setAttribute('data-theme',t);
      else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>

  <link rel="stylesheet" href="./css/reset.css?v=20260604" />
  <link rel="stylesheet" href="./css/theme.css?v=20260604" />
  <link rel="stylesheet" href="./css/layout.css?v=20260604" />
  <link rel="stylesheet" href="./css/filter-bar.css?v=20260604" />
  <link rel="stylesheet" href="./css/trend-table.css?v=20260604" />
  <link rel="stylesheet" href="./css/trend-overlay.css?v=20260604" />
  <link rel="stylesheet" href="./css/number-profile.css?v=20260604" />
  <link rel="stylesheet" href="./css/responsive.css?v=20260604" />
</head>
<body>
  <!-- ───────── 顶部信息栏 ───────── -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-brand">
        <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.2"/><path d="M12 3v1m0 16v1m-9-9h-1m18 0h-1m-4.22-5.78-1.42 1.42m9.9 9.9-1.42 1.42M6.34 17.66l-1.42 1.42m12.72-12.72-1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <h1>双色球走势图</h1>
      </div>
      <div class="header-meta" id="meta-info">数据加载中…</div>
    </div>
    <div class="theme-segment" id="theme-segment" role="radiogroup" aria-label="主题切换">
      <button role="radio" data-theme="auto" aria-checked="true" title="跟随系统" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
      <button role="radio" data-theme="light" aria-checked="false" title="浅色模式" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></button>
      <button role="radio" data-theme="dark" aria-checked="false" title="深色模式" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
    </div>
  </header>

  <!-- ───────── 顶部筛选栏 ───────── -->
  <section class="filter-bar" id="filter-bar">
    <!-- 由 js/filter-bar.js 动态渲染 -->
  </section>

  <!-- ───────── 走势图主体 ───────── -->
  <main class="trend-wrap" id="trend-wrap">
    <div class="trend-loading" id="trend-loading">
      <span class="spinner"></span>
      <span>加载走势数据…</span>
    </div>
    <div class="trend-scroll" id="trend-scroll" hidden>
      <table class="trend-table" id="trend-table">
        <!-- 由 js/trend-table.js 动态渲染（含 thead + tbody） -->
      </table>
      <svg class="trend-overlay" id="trend-overlay" aria-hidden="true"></svg>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-content">
      <span>
        数据来源：<a href="https://datachart.500.com/ssq/" target="_blank" rel="noopener">500网</a> · 仅供学习参考 · 切勿沉迷
      </span>
    </div>
  </footer>

  <script type="module" src="./js/main.js?v=20260604"></script>
</body>
</html>
