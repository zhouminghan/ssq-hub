  <meta property="og:image" content="https://zhouminghan.github.io/ssq-hub/og-image.png" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <!-- 防闪烁：在 CSS 加载前读取用户偏好或系统主题 -->
  <script>
    (function(){
      var t=localStorage.getItem('theme');
      if(t==='light'||t==='dark') document.documentElement.setAttribute('data-theme',t);
      else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.setAttribute('data-theme','dark');

<body>
  <!-- 键盘跳过导航：直达走势图主体 -->
  <a href="#trend-wrap" class="skip-link">跳到主内容</a>
  <!-- ───────── 顶部信息栏 ───────── -->

    <div class="header-left">

      <span class="spinner" aria-hidden="true"></span>
      <span>加载走势数据…</span>
    </div>
    <div class="trend-scroll" id="trend-scroll" hidden>
      <table class="trend-table" id="trend-table">

      </table>
      <svg class="trend-overlay" id="trend-overlay" aria-hidden="true"></svg>
    </div>

  <footer class="app-footer">
    <div class="footer-content">
      <span>
